spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/smarttask_dev
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
    mongodb:
      uri: mongodb://${MONGODB_HOST:localhost}:27017/smarttask_dev

app:
  jwt:
    secret: ${JWT_SECRET:docker-dev-secret-key-this-should-be-at-least-64-characters-long-for-hmac-sha512-algorithm}
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
  gcp:
    storage:
      bucket: smarttask-dev-uploads

logging:
  level:
    com.dev.smarttask: INFO
    org.springframework.security: WARN
