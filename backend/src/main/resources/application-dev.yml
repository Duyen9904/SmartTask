spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/smarttask_dev
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
    mongodb:
      uri: mongodb://localhost:27017/smarttask_dev

app:
  jwt:
    secret: dev-secret-key-this-should-be-at-least-64-characters-long-for-hmac-sha512-algorithm
    access-token-expiration-ms: 900000      # 15 minutes
    refresh-token-expiration-ms: 604800000  # 7 days
  gcp:
    storage:
      bucket: smarttask-dev-uploads

logging:
  level:
    com.dev.smarttask: DEBUG
    org.springframework.security: DEBUG
