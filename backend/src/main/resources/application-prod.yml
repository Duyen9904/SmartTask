spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
    mongodb:
      uri: ${MONGODB_URI}

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}
  gcp:
    storage:
      bucket: ${GCP_STORAGE_BUCKET:smarttask-prod-uploads}

logging:
  level:
    com.dev.smarttask: INFO
    org.springframework.security: WARN
